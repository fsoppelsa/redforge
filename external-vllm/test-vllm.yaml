apiVersion: v1
kind: Pod
metadata:
  name: vllm-external-smoke-test
  namespace: ollama-ai
  labels:
    app: vllm-external-smoke-test
spec:
  restartPolicy: Never
  containers:
    - name: test
      image: python:3.12-alpine
      imagePullPolicy: IfNotPresent
      env:
        - name: VLLM_BASE_URL
          value: "http://orin-vllm-predictor.ollama-ai.svc.cluster.local:8080"
        - name: VLLM_QUESTION
          value: "Say 'pong' if you can read this."
        - name: VLLM_MAX_TOKENS
          value: "512"
      command: ["/bin/sh", "-ec"]
      args:
        - |
          python - <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          base = os.environ.get("VLLM_BASE_URL", "").rstrip("/")
          question = os.environ.get("VLLM_QUESTION", "Hello")
          if not base:
            print("VLLM_BASE_URL is required", file=sys.stderr)
            sys.exit(2)

          def http_json(url: str, payload=None, timeout=20):
            headers = {"Content-Type": "application/json"}
            data = None if payload is None else json.dumps(payload).encode("utf-8")
            req = urllib.request.Request(
              url,
              data=data,
              headers=headers,
              method="GET" if payload is None else "POST",
            )
            try:
              with urllib.request.urlopen(req, timeout=timeout) as resp:
                body = resp.read().decode("utf-8", errors="replace")
                return resp.status, body
            except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", errors="replace") if e.fp else ""
              return e.code, body

          print(f"Checking models at: {base}/v1/models")
          status, body = http_json(f"{base}/v1/models")
          print(f"/v1/models HTTP {status}")
          if body:
            print(body)
          if status < 200 or status >= 300:
            sys.exit(1)

          try:
            models = json.loads(body)
            model_id = (models.get("data") or [{}])[0].get("id")
          except Exception:
            model_id = None

          if not model_id:
            print("Could not determine a model id from /v1/models", file=sys.stderr)
            sys.exit(1)

          payload = {
            "model": model_id,
            "messages": [
              {"role": "user", "content": question}
            ],
            "max_tokens": int(os.environ.get("VLLM_MAX_TOKENS", "512")),
            "temperature": 0,
          }

          print(f"\nSending chat completion to: {base}/v1/chat/completions")
          status, body = http_json(f"{base}/v1/chat/completions", payload=payload)
          print(f"/v1/chat/completions HTTP {status}")
          if body:
            print(body)
          sys.exit(0 if 200 <= status < 300 else 1)
          PY
