<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 72" width="310" height="72">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.9" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Terminal window frame -->
  <rect x="2" y="2" width="66" height="68" rx="6" fill="#0d1117" stroke="#d62728" stroke-width="1.5" opacity="0.95"/>
  <!-- Title bar fill -->
  <rect x="3.5" y="3.5" width="63" height="16" rx="5" fill="#161b22"/>
  <rect x="3.5" y="12" width="63" height="7.5" fill="#161b22"/>
  <!-- Traffic light dots -->
  <circle cx="15" cy="12" r="3.5" fill="#ff5f57"/>
  <circle cx="26" cy="12" r="3.5" fill="#ffbd2e"/>
  <circle cx="37" cy="12" r="3.5" fill="#28c840"/>

  <!-- Terminal prompt lines -->
  <text x="9" y="36" font-family="'Courier New', Courier, monospace" font-size="11" fill="#d62728" filter="url(#glow-soft)">$ redf</text>
  <text x="9" y="53" font-family="'Courier New', Courier, monospace" font-size="11" fill="#d62728" opacity="0.55">orge</text>
  <!-- Cursor blink simulation -->
  <rect x="47" y="43" width="7" height="10" fill="#d62728" opacity="0.75"/>

  <!-- Vertical separator -->
  <line x1="83" y1="10" x2="83" y2="63" stroke="#d6272840" stroke-width="1"/>

  <!-- Main title with glow -->
  <text x="95" y="46"
        font-family="'Courier New', Courier, monospace"
        font-size="27"
        font-weight="bold"
        fill="#d62728"
        filter="url(#glow)"
        letter-spacing="-0.5">RedForge</text>
</svg>
