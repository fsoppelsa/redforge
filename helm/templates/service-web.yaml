apiVersion: v1
kind: Service
metadata:
  name: redforge-web
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  selector:
    app: redforge-web
  ports:
    - name: http
      port: 8501
      targetPort: 8501
