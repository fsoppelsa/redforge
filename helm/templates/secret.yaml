apiVersion: v1
kind: Secret
metadata:
  name: redforge-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redforge.labels" . | nindent 4 }}
type: Opaque
stringData:
  nvd-api-key: {{ .Values.credentials.nvdApiKey | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: redforge-virtuoso
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redforge.labels" . | nindent 4 }}
type: Opaque
stringData:
  dba-password: {{ .Values.virtuoso.dbaPassword | quote }}
{{- if .Values.mcp.rhOfflineToken.enabled }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.mcp.rhOfflineToken.secretName | quote }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redforge.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.mcp.rhOfflineToken.secretKey }}: {{ .Values.mcp.rhOfflineToken.token | quote }}
{{- end }}
