{{- range .Values.localModelRoutes }}
apiVersion: v1
kind: Endpoints
metadata:
  name: {{ .name }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "redforge.labels" $ | nindent 4 }}
    redforge.local-model-route: {{ .name | quote }}
subsets:
  - addresses:
      - ip: {{ .targetIP }}
    ports:
      - name: http
        port: {{ .targetPort }}
        protocol: TCP
---
{{- end }}
