apiVersion: v1
kind: Service
metadata:
  name: redforge-mcp
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "redforge.labels" . | nindent 4 }}
    app.kubernetes.io/component: mcp
spec:
  selector:
    app: redforge-mcp
  ports:
    - name: http
      port: 8000
      targetPort: 8000
